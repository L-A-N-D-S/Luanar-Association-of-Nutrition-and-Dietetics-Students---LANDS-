<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANDS</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ===== Navbar ===== */
.navbar {
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  flex-wrap: wrap;
}

.logo img {
  height: 50px;
}

.menu-icon {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: green;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  align-items: center;
}

.nav-links a {
  color: green;
  font-weight: bold;
  text-decoration: none;
}

/* ===== Video ===== */
.video-container {
  width: 100%;
  padding: 10px;
  text-align: center;
}

.video-container video {
  width: 100%;
  max-width: 900px;
  height: auto;
  border-radius: 10px;
}

/* ===== CARD STYLE (NEW) ===== */
.section-card {
  max-width: 900px;
  margin: 30px auto;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* Card header (TITLE INSIDE CARD) */
.card-header {
  background: green;
  color: white;
  padding: 12px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

/* Card body */
.card-body {
  padding: 20px;
  text-align: center;
}

/* ===== EVENTS IMAGE ===== */
.events img {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
}

.event-title {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
  color: green;
}

/* ===== ANNOUNCEMENTS ===== */
.announcement-card {
  background: #f5f5f5;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
  max-width: 600px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.announcement-card h3 {
  margin: 0;
  font-size: 16px;
  color: green;
}

.announcement-card button {
  margin-top: 10px;
  background: green;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

/* PDF viewer */
#pdfViewer {
  width: 90%;
  height: 500px;
  border: none;
  margin: 20px auto;
  display: none;
}

/* ===== Footer ===== */
.footer {
  background: orange;
  color: white;
  text-align: center;
  padding: 20px;
}

.footer-links a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 6px 0;
  font-weight: bold;
}

.whatsapp {
  display: inline-block;
  background: green;
  padding: 10px 15px;
  margin-top: 10px;
  border-radius: 8px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

  .menu-icon {
    display: block;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    background: white;
    width: 100%;
    text-align: center;
    margin-top: 10px;
    padding: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }

  .logo img {
    height: 40px;
  }
}
</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="logo.png">
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="Events Us.html">Events</a></li>
    <li><a href="Annoucements.html">Announcements</a></li>
    <li><a href="About Us.html">About Us</a></li>
    <li><a href="Contact Us.html">Contact Us</a></li>
  </ul>
</nav>

<!-- ===== VIDEO ===== -->
<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="lands.mp4" type="video/mp4">
  </video>
</div>

<!-- ===== EVENTS CARD ===== -->
<div class="section-card">

  <div class="card-header">
    Upcoming Events
  </div>

  <div class="card-body events">
    <img id="eventImage">
    <div class="event-title" id="eventTitle"></div>
  </div>
</div>

<!-- ===== ANNOUNCEMENTS CARD ===== -->
<div class="section-card">

  <div class="card-header">
    Announcements
  </div>

  <div class="card-body" id="announcementList"></div>

</div>

<iframe id="pdfViewer"></iframe>

<!-- ===== FOOTER ===== -->
<footer class="footer">

  <div class="footer-links">
    <a href="Events Us.html">Events</a>
    <a href="Annoucements.html">Announcements</a>
    <a href="About Us.html">About Us</a>
    <a href="Contact Us.html">Contact Us</a>
  </div>

  <div class="whatsapp">
    WhatsApp: +265 890 277 409
  </div>

  <br>&copy; 2025 LANDS
</footer>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

/* ===== EVENTS ===== */
const repoOwner = "l-a-n-d-s";
const repoName = "Luanar-Association-of-Nutrition-and-Dietetics-Students---LANDS-";
const eventFolder = "event";

fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${eventFolder}`)
.then(res => res.json())
.then(data => {

  const images = data.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i));

  if(images.length > 0){
    const latest = images[0];

    document.getElementById("eventImage").src = latest.download_url;

    let title = latest.name
      .replace(/\.[^/.]+$/, "")
      .replace(/[_-]/g, " ");

    document.getElementById("eventTitle").textContent = title;
  }
});

/* ===== ANNOUNCEMENTS ===== */
const announcementFolder = "announcement";

fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${announcementFolder}`)
.then(res => res.json())
.then(data => {

  const pdfs = data.filter(f => f.name.endsWith(".pdf"));

  const container = document.getElementById("announcementList");

  pdfs.forEach(file => {

    let title = file.name
      .replace(".pdf", "")
      .replace(/[_-]/g, " ");

    let card = document.createElement("div");
    card.className = "announcement-card";

    card.innerHTML = `
      <h3>${title}</h3>
      <button onclick="openPDF('${file.download_url}')">View PDF</button>
    `;

    container.appendChild(card);
  });
});

/* ===== PDF VIEWER ===== */
function openPDF(url){
  const viewer = document.getElementById("pdfViewer");
  viewer.style.display = "block";
  viewer.src = url;
}
</script>

</body>
                                                 </html>
