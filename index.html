<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANDS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== Navbar ===== */
.navbar {
  background-color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
}

.logo img {
  height: 50px;
}

.menu-icon {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: green;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
}

.nav-links a {
  color: green;
  text-decoration: none;
  font-weight: bold;
}

@media (max-width:768px){
  .menu-icon { display:block; }

  .nav-links {
    display:none;
    flex-direction:column;
    background:white;
    width:100%;
    text-align:center;
  }

  .nav-links.active { display:flex; }
}

/* ===== Video ===== */
.video-container {
  text-align:center;
  padding:20px;
}

.video-container video {
  max-width:100%;
  height:auto;
}

/* ===== Events ===== */
.events {
  text-align: center;
  padding: 30px;
}

.events h2 {
  color: green;
}

.events img {
  max-width: 90%;
  border-radius: 10px;
  margin-top: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* ===== Footer ===== */
.footer {
  background: orange;
  color: white;
  text-align: center;
  padding: 20px;
}

.footer a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

/* WhatsApp button */
.whatsapp {
  display: inline-block;
  background: green;
  padding: 8px 15px;
  border-radius: 8px;
  margin-top: 10px;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- ===== Navbar ===== -->
<nav class="navbar">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="logo.png">
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="Events Us.html">Events</a></li>
    <li><a href="Annoucements.html">Annoucements</a></li>
    <li><a href="About Us.html">About Us</a></li>
    <li><a href="Contact Us.html">Contact Us</a></li>
  </ul>
</nav>

<!-- ===== Video ===== -->
<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="lands.mp4" type="video/mp4">
  </video>
</div>

<!-- ===== Events ===== -->
<section class="events">
  <h2>Upcoming Events</h2>
  <img id="eventImage" alt="Event Image">
</section>

<!-- ===== Footer ===== -->
<footer class="footer">
  <div>
    <a href="Events Us.html">Events</a> |
    <a href="Annoucements.html">Annoucements</a> |
    <a href="About Us.html">About Us</a> |
    <a href="Contact Us.html">Contact Us</a>
  </div>

  <div class="whatsapp">
    WhatsApp: +265 890 277 409
  </div>

  <br>&copy; 2025 LANDS Association
</footer>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

/* ===== GitHub API FIX ===== */
const repoOwner = "l-a-n-d-s";
const repoName = "Luanar-Association-of-Nutrition-and-Dietetics-Students---LANDS-";
const folder = "events";

fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folder}`)
.then(res => res.json())
.then(data => {

  const images = data.filter(file =>
    file.name.match(/\.(jpg|jpeg|png)$/i)
  );

  if(images.length > 0){
    // safer: pick FIRST image instead of last
    document.getElementById("eventImage").src = images[0].download_url;
  }

})
.catch(err => console.error("Error loading images:", err));
</script>

</body>
</html>
