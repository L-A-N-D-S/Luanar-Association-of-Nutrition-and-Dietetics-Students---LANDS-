<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANDS</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ===== NAVBAR ===== */
.navbar {
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  flex-wrap: wrap;
}

.logo img { height: 50px; }

.menu-icon {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: green;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
}

.nav-links a {
  color: green;
  font-weight: bold;
  text-decoration: none;
}

/* ===== VIDEO ===== */
.video-container {
  text-align: center;
  padding: 10px;
}

.video-container video {
  width: 100%;
  max-width: 900px;
  border-radius: 10px;
}

/* ===== CARDS ===== */
.section-card {
  max-width: 900px;
  margin: 25px auto;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  background: white;
}

.card-header {
  background: green;
  color: white;
  text-align: center;
  padding: 12px;
  font-size: 20px;
  font-weight: bold;
}

.card-body {
  padding: 15px;
  text-align: center;
}

/* ===== EVENTS ===== */
.events img {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
}

.event-title {
  color: green;
  font-weight: bold;
  margin-top: 10px;
}

/* ===== ANNOUNCEMENTS ===== */
.announcement-card {
  background: #f5f5f5;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  max-width: 600px;
}

.announcement-card h3 {
  color: green;
}

.announcement-card button {
  background: green;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}

/* ===== BMI SECTION ===== */
.bmi-body {
  display: flex;
  gap: 15px;
  background: orange;
  padding: 15px;
  flex-wrap: wrap;
}

/* LEFT SIDE */
.bmi-inputs {
  flex: 1;
  min-width: 250px;
}

.bmi-inputs input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.bmi-inputs input::placeholder {
  color: white;
  opacity: 0.9;
}

.bmi-inputs button {
  width: 100%;
  padding: 12px;
  background: darkgreen;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

/* RIGHT SIDE */
.bmi-results {
  flex: 1;
  min-width: 250px;
  text-align: left;
  padding: 10px;
}

.bmi-results h3 {
  margin-top: 0;
}

.bmi-results ul {
  list-style: none;
  padding: 0;
}

.bmi-results li {
  padding: 8px;
  margin: 5px 0;
  background: rgba(255,255,255,0.6);
  border-radius: 6px;
}

.bmi-results li.active {
  background: green;
  color: white;
  font-weight: bold;
}

#bmiOutput {
  font-weight: bold;
  margin-bottom: 10px;
}

/* ===== FOOTER ===== */
.footer {
  background: orange;
  color: white;
  text-align: center;
  padding: 20px;
}

.footer-links a {
  display: block;
  color: white;
  margin: 5px 0;
  text-decoration: none;
}

.whatsapp {
  background: green;
  padding: 10px;
  display: inline-block;
  margin-top: 10px;
  border-radius: 8px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .menu-icon { display: block; }

  .nav-links {
    display: none;
    flex-direction: column;
    background: white;
    width: 100%;
    text-align: center;
  }

  .nav-links.active { display: flex; }

  .bmi-body {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="logo.png"></div>

  <ul class="nav-links" id="navLinks">
    <li><a href="Events Us.html">Events</a></li>
    <li><a href="Annoucements.html">Announcements</a></li>
    <li><a href="About Us.html">About Us</a></li>
    <li><a href="Contact Us.html">Contact Us</a></li>
  </ul>
</nav>

<!-- VIDEO -->
<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="lands.mp4">
  </video>
</div>

<!-- EVENTS -->
<div class="section-card">
  <div class="card-header">Upcoming Events</div>
  <div class="card-body events">
    <img id="eventImage">
    <div class="event-title" id="eventTitle"></div>
  </div>
</div>

<!-- ANNOUNCEMENTS -->
<div class="section-card">
  <div class="card-header">Announcements</div>
  <div class="card-body" id="announcementList"></div>
</div>

<!-- BMI CALCULATOR -->
<div class="section-card">
  <div class="card-header">BMI Calculator</div>

  <div class="bmi-body">

    <!-- LEFT -->
    <div class="bmi-inputs">
      <input type="number" id="weight" placeholder="Enter weight (kg)">
      <input type="number" id="height" placeholder="Enter height (m)">
      <button onclick="calcBMI()">GO</button>

      <div id="bmiOutput"></div>
    </div>

    <!-- RIGHT -->
    <div class="bmi-results">
      <h3>Results Guide</h3>

      <ul id="bmiList">
        <li id="under">Underweight</li>
        <li id="normal">Normal</li>
        <li id="over">Overweight</li>
        <li id="obese">Obese</li>
      </ul>

      <p id="advice"></p>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="footer">

  <div class="footer-links">
    <a href="Events Us.html">Events</a>
    <a href="Annoucements.html">Announcements</a>
    <a href="About Us.html">About Us</a>
    <a href="Contact Us.html">Contact Us</a>
  </div>

  <div class="whatsapp">
    WhatsApp: +265 890 277 409
  </div>

  <br>&copy; 2025 LANDS
</footer>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

/* ===== BMI CALCULATOR ===== */
function calcBMI() {
  const w = parseFloat(document.getElementById("weight").value);
  const h = parseFloat(document.getElementById("height").value);

  if (!w || !h) return;

  const bmi = (w / (h * h)).toFixed(1);

  let result = "";
  let advice = "";

  reset();

  if (bmi < 18.5) {
    result = "Underweight";
    document.getElementById("under").classList.add("active");
    advice = "Eat more nutritious food and increase calorie intake.";
  }
  else if (bmi < 25) {
    result = "Normal";
    document.getElementById("normal").classList.add("active");
    advice = "Great job! Maintain your healthy lifestyle.";
  }
  else if (bmi < 30) {
    result = "Overweight";
    document.getElementById("over").classList.add("active");
    advice = "Exercise more and reduce sugar/fat intake.";
  }
  else {
    result = "Obese";
    document.getElementById("obese").classList.add("active");
    advice = "Seek medical advice and start a weight control plan.";
  }

  document.getElementById("bmiOutput").innerText = "BMI: " + bmi + " (" + result + ")";
  document.getElementById("advice").innerText = advice;
}

function reset(){
  document.querySelectorAll(".bmi-results li").forEach(li => {
    li.classList.remove("active");
  });
}
</script>

</body>
</html>
