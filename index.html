<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANDS</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ===== Navbar ===== */
.navbar {
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  flex-wrap: wrap;
}

.logo img {
  height: 50px;
  max-width: 120px;
}

/* menu icon */
.menu-icon {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: green;
}

/* nav links */
.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  align-items: center;
}

.nav-links a {
  color: green;
  font-weight: bold;
  text-decoration: none;
}

/* ===== Video ===== */
.video-container {
  width: 100%;
  padding: 10px;
  text-align: center;
}

.video-container video {
  width: 100%;
  max-width: 900px;
  height: auto;
  border-radius: 10px;
}

/* ===== Events ===== */
.events {
  text-align: center;
  padding: 20px;
}

.events h2 {
  color: green;
  font-size: 24px;
}

.events img {
  width: 100%;
  max-width: 600px;
  height: auto;
  border-radius: 10px;
  margin-top: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.event-title {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
  color: green;
}

/* ===== Footer ===== */
.footer {
  background: orange;
  color: white;
  text-align: center;
  padding: 20px;
}

.footer-links a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 6px 0;
  font-weight: bold;
}

.whatsapp {
  display: inline-block;
  background: green;
  padding: 10px 15px;
  margin-top: 10px;
  border-radius: 8px;
}

/* ===== RESPONSIVE DESIGN ===== */
@media (max-width: 768px) {

  .menu-icon {
    display: block;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    background: white;
    width: 100%;
    text-align: center;
    margin-top: 10px;
    padding: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }

  .logo img {
    height: 40px;
  }

  .events h2 {
    font-size: 20px;
  }

  .event-title {
    font-size: 16px;
  }

  .whatsapp {
    width: 90%;
  }
}
</style>
</head>

<body>

<!-- ===== Navbar ===== -->
<nav class="navbar">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="logo.png">
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="Events Us.html">Events</a></li>
    <li><a href="Annoucements.html">Annoucements</a></li>
    <li><a href="About Us.html">About Us</a></li>
    <li><a href="Contact Us.html">Contact Us</a></li>
  </ul>
</nav>

<!-- ===== Video ===== -->
<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="lands.mp4" type="video/mp4">
  </video>
</div>

<!-- ===== Events ===== -->
<section class="events">
  <h2>Upcoming Events</h2>

  <img id="eventImage" alt="Event Image">
  <div class="event-title" id="eventTitle"></div>
</section>

<!-- ===== Footer ===== -->
<footer class="footer">

  <div class="footer-links">
    <a href="Events Us.html">Events</a>
    <a href="Annoucements.html">Annoucements</a>
    <a href="About Us.html">About Us</a>
    <a href="Contact Us.html">Contact Us</a>
  </div>

  <div class="whatsapp">
    WhatsApp: +265 890 277 409
  </div>

  <br>&copy; 2025 LANDS
</footer>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

/* ===== GitHub API ===== */
const repoOwner = "l-a-n-d-s";
const repoName = "Luanar-Association-of-Nutrition-and-Dietetics-Students---LANDS-";
const folder = "event";

fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folder}`)
.then(res => res.json())
.then(data => {

  const images = data.filter(file =>
    file.name.match(/\.(jpg|jpeg|png)$/i)
  );

  if(images.length > 0){
    const latest = images[0];

    document.getElementById("eventImage").src = latest.download_url;

    let title = latest.name
      .replace(/\.[^/.]+$/, "")
      .replace(/[_-]/g, " ");

    document.getElementById("eventTitle").textContent = title;
  }

});
</script>

</body>
</html>
